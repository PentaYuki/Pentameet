<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interview Assistant</title>
<style>
  /* ── Reset & Tokens ─────────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:          #0d0f12;
    --surface:     #151820;
    --surface-2:   #1c2030;
    --border:      #252a38;
    --border-glow: rgba(82, 182, 255, 0.25);
    --text:        #dde3f0;
    --text-dim:    #5a6480;
    --text-muted:  #3a4060;
    --accent:      #52b6ff;
    --accent-2:    #7c6af7;
    --green:       #3ddc84;
    --orange:      #f5a623;
    --red:         #ff5370;
    --radius:      8px;
    --font-mono:   "JetBrains Mono", "Cascadia Code", "Fira Code", monospace;
    --font-ui:     "Inter", "SF Pro Display", system-ui, sans-serif;
  }

  body {
    width: 380px;
    min-height: 200px;
    max-height: 600px;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 13px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ──────────────────────────────────────────────────────────────── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px 9px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    user-select: none;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo {
    width: 22px;
    height: 22px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.5px;
  }

  .title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.01em;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* Connection pill */
  .conn-pill {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 3px 8px;
    border-radius: 99px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: all 0.2s;
    cursor: pointer;
  }
  .conn-pill.connected {
    background: rgba(61, 220, 132, 0.12);
    color: var(--green);
    border: 1px solid rgba(61, 220, 132, 0.25);
  }
  .conn-pill.disconnected {
    background: rgba(255, 83, 112, 0.12);
    color: var(--red);
    border: 1px solid rgba(255, 83, 112, 0.25);
  }
  .conn-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
  }
  .connected .conn-dot {
    animation: pulse-green 1.8s ease-in-out infinite;
  }
  @keyframes pulse-green {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Icon buttons */
  .icon-btn {
    width: 26px;
    height: 26px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, color 0.15s;
  }
  .icon-btn:hover {
    background: var(--surface-2);
    color: var(--text);
  }
  .icon-btn svg { width: 14px; height: 14px; }

  /* ── Status Bar ───────────────────────────────────────────────────────────── */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    min-height: 30px;
    flex-shrink: 0;
  }

  .status-indicator {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .status-indicator.idle         { background: var(--text-muted); }
  .status-indicator.speaking     { background: var(--orange); animation: blink 0.6s ease-in-out infinite alternate; }
  .status-indicator.transcribing { background: var(--accent); animation: spin-dot 1s linear infinite; }
  .status-indicator.disconnected { background: var(--red); }

  @keyframes blink {
    from { opacity: 1; transform: scale(1); }
    to   { opacity: 0.5; transform: scale(0.7); }
  }
  @keyframes spin-dot {
    0%   { box-shadow: 0 0 0 0 rgba(82,182,255,0.5); }
    50%  { box-shadow: 0 0 0 4px rgba(82,182,255,0); }
    100% { box-shadow: 0 0 0 0 rgba(82,182,255,0); }
  }

  .status-text {
    font-size: 11px;
    color: var(--text-dim);
    font-family: var(--font-mono);
    flex: 1;
  }
  .status-text.speaking     { color: var(--orange); }
  .status-text.transcribing { color: var(--accent); }

  /* ── Body Panels ──────────────────────────────────────────────────────────── */
  .panels {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 0;
    padding: 10px 12px;
    gap: 8px;
  }
  .panels::-webkit-scrollbar { width: 4px; }
  .panels::-webkit-scrollbar-track { background: transparent; }
  .panels::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Panel card */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .panel.active { border-color: var(--border-glow); }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 10px;
    border-bottom: 1px solid var(--border);
    background: var(--surface-2);
  }

  .panel-label {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text-dim);
  }
  .panel-label svg { width: 10px; height: 10px; }

  .panel-badge {
    font-size: 9px;
    font-family: var(--font-mono);
    color: var(--text-muted);
  }

  .panel-body {
    padding: 10px 11px;
    min-height: 44px;
    font-size: 12.5px;
    line-height: 1.6;
    color: var(--text);
    font-family: var(--font-mono);
    word-break: break-word;
  }

  .empty-state {
    color: var(--text-muted);
    font-style: italic;
    font-family: var(--font-ui);
    font-size: 12px;
  }

  /* Transcript cursor blink */
  .cursor-blink {
    display: inline-block;
    width: 2px;
    height: 13px;
    background: var(--accent);
    vertical-align: middle;
    margin-left: 2px;
    animation: cur-blink 1s step-end infinite;
  }
  @keyframes cur-blink { 50% { opacity: 0; } }

  /* Suggestion bullets */
  .suggestion-line {
    display: flex;
    gap: 7px;
    margin-bottom: 4px;
  }
  .suggestion-line:last-child { margin-bottom: 0; }
  .bullet { color: var(--accent); font-weight: 700; flex-shrink: 0; }

  /* Skeleton loader */
  .skeleton {
    height: 12px;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--surface-2) 25%, var(--border) 50%, var(--surface-2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.2s ease-in-out infinite;
    margin-bottom: 6px;
  }
  .skeleton:last-child { margin-bottom: 0; width: 60%; }
  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* Error state */
  .error-msg {
    color: var(--red);
    font-size: 11.5px;
    font-family: var(--font-mono);
    background: rgba(255, 83, 112, 0.07);
    border: 1px solid rgba(255, 83, 112, 0.2);
    border-radius: 5px;
    padding: 7px 10px;
    margin: 0 12px 8px;
    word-break: break-word;
    flex-shrink: 0;
  }
  .error-msg:empty { display: none; }

  /* ── Footer ───────────────────────────────────────────────────────────────── */
  .footer {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 12px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .btn-ask {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    padding: 8px 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #fff;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.03em;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }
  .btn-ask::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.15s;
  }
  .btn-ask:hover::after { background: rgba(255,255,255,0.08); }
  .btn-ask:active { transform: scale(0.98); }
  .btn-ask:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
  .btn-ask svg { width: 13px; height: 13px; }

  .shortcut-hint {
    font-size: 10px;
    color: var(--text-muted);
    font-family: var(--font-mono);
    white-space: nowrap;
  }

  .btn-clear {
    width: 30px;
    height: 30px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .btn-clear:hover { background: var(--surface-2); color: var(--text); }
  .btn-clear svg { width: 13px; height: 13px; }

  /* ── Spinner ──────────────────────────────────────────────────────────────── */
  .spin {
    width: 12px;
    height: 12px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: rotate 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes rotate { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────────────────────── -->
<div class="header">
  <div class="header-left">
    <div class="logo">IA</div>
    <span class="title">Interview Assistant</span>
  </div>
  <div class="header-right">
    <div id="connPill" class="conn-pill disconnected" title="Click để reconnect">
      <div class="conn-dot"></div>
      <span id="connLabel">Offline</span>
    </div>
    <button class="icon-btn" id="btnReconnect" title="Reconnect">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M1 4v6h6M23 20v-6h-6"/>
        <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/>
      </svg>
    </button>
  </div>
</div>

<!-- ── Status Bar ─────────────────────────────────────────────────────────── -->
<div class="status-bar">
  <div class="status-indicator idle" id="statusDot"></div>
  <span class="status-text" id="statusText">Chờ câu hỏi...</span>
</div>

<!-- ── Error ──────────────────────────────────────────────────────────────── -->
<div class="error-msg" id="errorMsg"></div>

<!-- ── Panels ─────────────────────────────────────────────────────────────── -->
<div class="panels">

  <!-- Transcript Panel -->
  <div class="panel" id="panelTranscript">
    <div class="panel-header">
      <div class="panel-label">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/>
        </svg>
        Interviewer
      </div>
      <span class="panel-badge" id="transcriptLen">—</span>
    </div>
    <div class="panel-body" id="transcriptBody">
      <span class="empty-state">Chờ người phỏng vấn nói...</span>
    </div>
  </div>

  <!-- Suggestion Panel -->
  <div class="panel" id="panelSuggestion">
    <div class="panel-header">
      <div class="panel-label">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 16v-4M12 8h.01"/>
        </svg>
        Gợi ý trả lời
      </div>
      <span class="panel-badge" id="geminiLabel">Gemini Flash</span>
    </div>
    <div class="panel-body" id="suggestionBody">
      <span class="empty-state">Nhấn ⌘⇧A hoặc nút bên dưới để nhận gợi ý.</span>
    </div>
  </div>

</div>

<!-- ── Footer ─────────────────────────────────────────────────────────────── -->
<div class="footer">
  <button class="btn-clear" id="btnClear" title="Xoá tất cả (⌘⇧C)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="3 6 5 6 21 6"/>
      <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
      <path d="M10 11v6M14 11v6"/>
      <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
    </svg>
  </button>
  <button class="btn-ask" id="btnAsk">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <line x1="22" y1="2" x2="11" y2="13"/>
      <polygon points="22 2 15 22 11 13 2 9 22 2"/>
    </svg>
    <span id="btnAskLabel">Lấy gợi ý</span>
  </button>
  <span class="shortcut-hint">⌘⇧A</span>
</div>

<script src="popup.js"></script>
</body>
</html>
